# Enable debug logging to display detailed startup and condition evaluation info

# Server configuration
server.port=8080

# H2 Database Configuration (In-memory for development)
spring.datasource.url=jdbc:h2:mem:universitydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# CORS Configuration - IMPORTANT for Angular frontend
spring.web.cors.allowed-origins=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# JWT Configuration (Choose a long, secure secret for production)
jwt.secret=ThisIsAVerySecureSecretKeyForUMSTokenGenerationAndShouldBeLongerThan32Bytes
jwt.expiration=3600000

# Jackson Configuration for Lazy Loading
spring.jackson.serialization.fail-on-empty-beans=false
