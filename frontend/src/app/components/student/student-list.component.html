<div class="container mt-4">
  <h2>Student List</h2>
  <button class="btn btn-primary mb-3" routerLink="/students/add">Add New Student</button>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Major</th>
        <th>Student ID</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let student of students">
        <td>{{ student.id }}</td>
        <td>{{ student.firstName }}</td>
        <td>{{ student.lastName }}</td>
        <td>{{ student.major }}</td>
        <td>{{ student.studentId }}</td>
        <td>
          <button class="btn btn-sm btn-info me-2" [routerLink]="['/students/edit', student.id]">
            Edit
          </button>
          <button class="btn btn-sm btn-secondary me-2" [routerLink]="['/students', student.id, 'dashboard']">
            Dashboard
          </button>
          <button class="btn btn-sm btn-danger" (click)="deleteStudent(student.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
